name: gitartwork

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: jasineri/gitartwork@v1
        with:
          user_name: Bismay-exe
          text: BISMAY

      - uses: jasineri/simple-push-action@v1
        with:
          commit_message: "generate gitartwork"
